    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:         #F3F8F2;
      --bg-alt:     #EAF3E8;
      --forest:     #1C3620;
      --deep:       #2E5233;
      --sage:       #6E9B74;

      --sage-pale:  #C8DEC9;
      --mint:       #B8D4BA;
      --leaf:       #4A7A50;
      --earth:      #5A7D5C;
      --text:       #1C2E1E;
      --text-mid:   #456047;
      --text-soft:  #7A9B7D;
      --border:     #D0E4D1;
      --card-bg:    #FAFCFA;

    body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--sage); border-radius: 99px; }

    /* Animations */
    .page-enter { animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .stagger > * { animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    .stagger > *:nth-child(1) { animation-delay:0.05s; }
    .stagger > *:nth-child(2) { animation-delay:0.13s; }
    .stagger > *:nth-child(3) { animation-delay:0.21s; }
    .stagger > *:nth-child(4) { animation-delay:0.29s; }
    .stagger > *:nth-child(5) { animation-delay:0.37s; }
    .stagger > *:nth-child(6) { animation-delay:0.45s; }

    /* Marquee */
    .marquee-wrap { overflow:hidden; white-space:nowrap; width:100%; }
    .marquee-track { display:inline-flex; animation:marquee 30s linear infinite; }
    .marquee-track:hover { animation-play-state:paused; }
    @keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-50%); } }

    /* Nav */
    .nav-link { position:relative; padding-bottom:3px; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:0; height:1.5px; width:0; background:var(--sage); transition:width 0.3s ease; border-radius:99px; }
    .nav-link:hover::after, .nav-link.active::after { width:100%; }

    /* Cards */
    .card { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; transition:transform 0.28s ease,box-shadow 0.28s ease,border-color 0.28s ease; }
    .card:hover { transform:translateY(-6px); box-shadow:0 20px 56px rgba(46,82,51,0.11); border-color:var(--sage-pale); }
    .card-exp { border-left:3px solid transparent; transition:border-left-color 0.28s,transform 0.28s,box-shadow 0.28s,background 0.28s; border-radius:16px; background:var(--card-bg); border-top:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .card-exp:hover { border-left-color:var(--sage); transform:translateY(-4px); box-shadow:0 16px 48px rgba(46,82,51,0.10); background:#F8FCF8; }

    /* Human Side cards */
    .hs-card { cursor:pointer; transition:transform 0.28s ease,box-shadow 0.28s ease,border-color 0.28s ease; }
    .hs-card:hover { transform:translateY(-6px) scale(1.01); box-shadow:0 24px 60px rgba(46,82,51,0.14); }
    .hs-card:hover .hs-hint { opacity:1 !important; transform:translateY(0) !important; }

    /* Buttons */
    .btn-forest { background:var(--forest); color:#E8F4E8; border:1.5px solid var(--forest); transition:background 0.22s,border-color 0.22s; cursor:pointer; }
    .btn-forest:hover { background:var(--deep); border-color:var(--deep); }
    .btn-leaf { background:transparent; color:var(--deep); border:1.5px solid var(--sage); transition:background 0.22s,color 0.22s,border-color 0.22s; cursor:pointer; }
    .btn-leaf:hover { background:var(--sage-pale); border-color:var(--leaf); color:var(--leaf); }

    /* Tag */
    .tag { display:inline-flex; align-items:center; background:rgba(110,155,116,0.12); color:var(--leaf); font-size:11px; font-weight:600; letter-spacing:0.05em; padding:4px 12px; border-radius:99px; border:1px solid rgba(110,155,116,0.3); }

    /* Eyebrow */
    .eyebrow { font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--sage); }

    /* Dot grid */
    .dot-bg { background-image:radial-gradient(circle, rgba(110,155,116,0.2) 1px, transparent 1px); background-size:26px 26px; }

    /* Pull quote */
    .pull-quote { border-left:3px solid var(--sage); padding-left:20px; }

    /* Skill chip */
    .skill-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:8px; background:rgba(110,155,116,0.1); border:1px solid var(--border); font-size:12px; font-weight:500; color:var(--earth); }

    /* Form */
    .form-input { width:100%; padding:13px 16px; border-radius:10px; border:1.5px solid var(--border); background:#fff; font-size:14px; font-family:'Inter',sans-serif; color:var(--text); transition:border-color 0.2s; outline:none; }
    .form-input:focus { border-color:var(--sage); box-shadow:0 0 0 3px rgba(110,155,116,0.12); }

    /* Photo slot */
    .photo-slot { transition:all 0.24s ease; cursor:default; }
    .photo-slot:hover { border-color:var(--sage) !important; background:rgba(110,155,116,0.08) !important; }
    .photo-slot:hover .ps-icon { opacity:0.85 !important; transform:scale(1.12) !important; }

    /* Modal */
    .modal-overlay { animation:mFadeIn 0.2s ease both; }
    @keyframes mFadeIn { from{opacity:0} to{opacity:1} }
    .modal-inner { animation:mSlideUp 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes mSlideUp { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    /* Responsive */
    @media(max-width:720px) {

  </style>

  /* ─────────────────────────────────────────────────
     ROUTER
  ───────────────────────────────────────────────── */
  function useRouter() {
    const get = () => window.location.hash.replace('#','') || '/';
    const [path, setPath] = useState(get);
    useEffect(() => {
      const h = () => { setPath(get()); window.scrollTo({top:0,behavior:'smooth'}); };
      window.addEventListener('hashchange', h);
      return () => window.removeEventListener('hashchange', h);
    }, []);
    const navigate = useCallback(to => { window.location.hash = to; }, []);
    return { path, navigate };
  }

                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:'10px'}}>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>{proj.tools.map(tool=><span key={tool} className="tag">{tool}</span>)}</div>
                  <span style={{fontSize:'12px',fontWeight:700,color:'var(--leaf)',letterSpacing:'0.06em'}}>{p.viewBtn}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </Page>
    );
  }

  /* ─────────────────────────────────────────────────
     PROJECT DETAIL  (+ photo gallery)
  ───────────────────────────────────────────────── */
  function ProjectDetailPage({ slug, navigate, t }) {
    const d = t.projectDetails[slug];
    const g = t.gallery;
    if (!d) return <Page><p style={{color:'var(--sage)'}}>Not found.</p></Page>;
    return (
      <Page>
        <Back label={t.nav.projects} onClick={()=>navigate('/projects')}/>
        <div style={{marginBottom:'52px',paddingBottom:'40px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}><div style={{width:'36px',height:'2.5px',background:'linear-gradient(to right,var(--deep),var(--sage))',borderRadius:'99px'}}/><Leaf size={12} color="var(--sage)"/></div>
          <h1 style={{fontSize:'clamp(2rem,5vw,3.4rem)',fontWeight:900,letterSpacing:'-0.035em',color:'var(--forest)',marginBottom:'16px',lineHeight:1.05}}>{d.title}</h1>
          <p style={{fontSize:'17px',color:'var(--sage-light)',maxWidth:'540px',lineHeight:1.7,fontWeight:300}}>{d.summary}</p>
        </div>
        <div className="detail-grid" style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) 240px',gap:'24px',alignItems:'start'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            <div style={{background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'16px',padding:'28px'}}>
              <p className="eyebrow" style={{marginBottom:'14px'}}>Overview</p>
              <p style={{fontSize:'15px',lineHeight:1.85,color:'var(--text)'}}>{d.overview}</p>
            </div>
            {d.sections.map((sec,i)=>(
              <div key={i} style={{background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'16px',padding:'28px'}}>
                <p className="eyebrow" style={{marginBottom:'14px'}}>{sec.heading}</p>
                <p style={{fontSize:'15px',lineHeight:1.85,color:'var(--text)'}}>{sec.content}</p>
              </div>
            ))}
          </div>
          <div style={{position:'sticky',top:'80px',background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'16px',padding:'24px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}><Leaf size={14} color="var(--sage)"/><p className="eyebrow">Tools & Methods</p></div>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {d.tools.map(tool=>(
                <div key={tool} style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <div style={{width:'3px',height:'20px',background:'linear-gradient(to bottom,var(--leaf),var(--sage-light))',borderRadius:'99px',flexShrink:0}}/>
                  <span style={{fontSize:'13px',fontWeight:500,color:'var(--text)'}}>{tool}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── Photo Gallery ── */}
       
      </Page>
    );
  }

  /* ─────────────────────────────────────────────────
     HUMAN SIDE  — expandable cards + modal
  ───────────────────────────────────────────────── */
  function HumanSidePage({ t }) {
    const hs = t.humanSide;
    const g  = t.gallery;
    const [openIdx, setOpenIdx] = useState(null);

    useEffect(() => {
      const onKey = e => { if (e.key === 'Escape') setOpenIdx(null); };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, []);
    useEffect(() => {
      document.body.style.overflow = openIdx !== null ? 'hidden' : '';
      return () => { document.body.style.overflow = ''; };
    }, [openIdx]);

    const accents = [
      {bg:'linear-gradient(135deg,rgba(110,155,116,0.18),rgba(74,122,80,0.1))',bd:'rgba(110,155,116,0.3)'},
      {bg:'var(--card-bg)',bd:'var(--border)'},
      {bg:'var(--card-bg)',bd:'var(--border)'},
      {bg:'linear-gradient(135deg,rgba(46,82,51,0.06),rgba(110,155,116,0.09))',bd:'rgba(110,155,116,0.2)'},
      {bg:'var(--card-bg)',bd:'var(--border)'},
      {bg:'var(--card-bg)',bd:'var(--border)'},
    ];

    return (
      <Page>
        <Header title={hs.title} subtitle={hs.subtitle} index="04"/>

        {/* Card grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'16px'}} className="stagger">
          {hs.items.map((item,i)=>(
            <div key={i} className="hs-card"
                 onClick={()=>setOpenIdx(i)}
                 style={{
                   padding:'32px',position:'relative',overflow:'hidden',borderRadius:'18px',
                   background:accents[i].bg, border:`1px solid ${accents[i].bd}`,
                 }}>
              {/* Big faded emoji bg */}
              <div style={{position:'absolute',top:'-10px',right:'-8px',fontSize:'80px',opacity:0.07,userSelect:'none',pointerEvents:'none',lineHeight:1}}>
                {item.emoji}
              </div>
              {i===0 && <div style={{position:'absolute',bottom:'12px',right:'12px',opacity:0.15}}><Leaf size={36} color="var(--deep)" rotate={20}/></div>}

              <div style={{position:'relative',zIndex:1}}>
                <div style={{fontSize:'38px',marginBottom:'14px',lineHeight:1}}>{item.emoji}</div>
                <h3 style={{fontSize:'15px',fontWeight:700,color:'var(--forest)',marginBottom:'10px',lineHeight:1.35}}>{item.title}</h3>
                <p style={{fontSize:'13px',lineHeight:1.75,color:'var(--earth)',marginBottom:'20px'}}>{item.desc}</p>
                {/* Hover peek hint */}
                <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                  <div style={{width:'14px',height:'1.5px',background:'var(--sage-pale)',borderRadius:'99px',transition:'width 0.24s'}}/>
                  <span className="hs-hint"
                        style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--sage)',opacity:0,transform:'translateY(5px)',transition:'opacity 0.22s,transform 0.22s'}}>
                    {g.peekLabel} →
                  </span>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Technical skills strip */}
        <div style={{marginTop:'40px',background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'16px',padding:'28px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:'-20px',top:'-20px',opacity:0.04,pointerEvents:'none'}}><Branch width={180} color="var(--deep)" opacity={1}/></div>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'18px'}}>
            <div style={{width:'28px',height:'2.5px',background:'linear-gradient(to right,var(--deep),var(--sage))',borderRadius:'99px'}}/>
            <Leaf size={12} color="var(--sage)"/>
            <p className="eyebrow">Technical Skills</p>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
            {['SQL','Python (Pandas / Numpy)','Minitab','Google Suite','Excel','PowerPoint','Canva','CapCut','Adobe Photoshop','HTML / CSS','p5.js'].map(s=>(
              <span key={s} className="skill-chip">{s}</span>
            ))}
          </div>
        </div>

        {/* ────────── MODAL ────────── */}
        {openIdx !== null && (
          <div className="modal-overlay"
               onClick={e=>{ if(e.target===e.currentTarget) setOpenIdx(null); }}
               style={{position:'fixed',inset:0,zIndex:200,background:'rgba(18,36,20,0.65)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
            <div className="modal-inner"
                 style={{background:'var(--card-bg)',borderRadius:'24px',maxWidth:'680px',width:'100%',maxHeight:'90vh',overflowY:'auto',border:'1px solid var(--border)',boxShadow:'0 50px 110px rgba(18,36,20,0.32)',position:'relative',display:'flex',flexDirection:'column'}}>

              {/* ── Modal header — forest band ── */}
              <div style={{background:'linear-gradient(135deg,var(--forest),var(--deep))',borderRadius:'24px 24px 0 0',padding:'36px 36px 32px',position:'relative',overflow:'hidden',flexShrink:0}}>
                {/* Leaf decorations */}
                <div style={{position:'absolute',right:'-24px',top:'-24px',opacity:0.1,pointerEvents:'none'}}><Leaf size={140} color="#fff" rotate={20}/></div>
                <div style={{position:'absolute',left:'-10px',bottom:'-30px',opacity:0.06,pointerEvents:'none'}}><Leaf size={90} color="#fff" rotate={-35}/></div>
                {/* Close × */}
                <button onClick={()=>setOpenIdx(null)}
                        style={{position:'absolute',top:'18px',right:'18px',width:'36px',height:'36px',borderRadius:'50%',background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'rgba(255,255,255,0.8)',fontSize:'16px',transition:'background 0.2s',zIndex:2}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.24)'}
                        onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.12)'}>✕</button>
                <div style={{position:'relative',zIndex:1}}>
                  <div style={{fontSize:'52px',marginBottom:'14px',lineHeight:1}}>{hs.items[openIdx].emoji}</div>
                  <h2 style={{fontSize:'22px',fontWeight:800,color:'#fff',marginBottom:'12px',lineHeight:1.2,paddingRight:'48px'}}>{hs.items[openIdx].title}</h2>
                  <p style={{fontSize:'14px',lineHeight:1.85,color:'rgba(200,222,201,0.88)',maxWidth:'460px'}}>{hs.items[openIdx].desc}</p>
                </div>
              </div>

              {/* ── Modal body — media slots ── */}
              <div style={{padding:'28px 32px 32px',flexShrink:0}}>
                {/* Section label */}
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'18px'}}>
                  <div style={{width:'24px',height:'2px',background:'linear-gradient(to right,var(--deep),var(--sage))',borderRadius:'99px'}}/>
                  <Leaf size={12} color="var(--sage)"/>
                  <p className="eyebrow">{g.mediaLabel}</p>
                  <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
                </div>

                <div className="photo-grid" style={{display:'grid',gridTemplateColumns:'1fr',gap:'12px'}}>
                  {hs.items[openIdx].photos.map((src,j)=>(
                <img key={j} src={src} style={{width:'100%',borderRadius:'14px',objectFit:'cover',aspectRatio:'3/2'}}/>
                   ))}
                </div>

                {/* Hint */}
                <div style={{marginTop:'16px',padding:'12px 16px',background:'rgba(110,155,116,0.06)',border:'1px solid var(--border)',borderRadius:'10px',display:'flex',gap:'10px',alignItems:'flex-start'}}>
                  <span style={{fontSize:'14px',flexShrink:0}}>💡</span>
                  <p style={{fontSize:'11px',color:'var(--text-soft)',lineHeight:1.65}}>{g.addHint}</p>
                </div>
              </div>
            </div>
          </div>
        )}
      </Page>
    );
  }

  /* ─────────────────────────────────────────────────
     CONTACT
  ───────────────────────────────────────────────── */
  function ContactPage({ t }) {
    const c = t.contact;
    const [form,setForm] = useState({name:'',email:'',message:''});
    const [sent,setSent] = useState(false);
    const upd = f => e => setForm(p=>({...p,[f]:e.target.value}));
    return (
      <Page>
        <div style={{marginBottom:'64px',position:'relative'}}>
          <div style={{position:'absolute',right:0,top:'-10px',opacity:0.07,pointerEvents:'none'}}><Branch width={200} color="var(--deep)" opacity={1}/></div>
          <p className="eyebrow" style={{marginBottom:'16px'}}>{c.subtitle}</p>
          <h1 style={{fontSize:'clamp(2.5rem,7vw,5.5rem)',fontWeight:900,letterSpacing:'-0.04em',color:'var(--forest)',lineHeight:1,display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap'}}>
            {c.title}<Leaf size={48} color="var(--sage)" opacity={0.6} rotate={15}/>
          </h1>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'40px'}}>
          <div>
            <div style={{display:'flex',flexDirection:'column',gap:'12px',marginBottom:'24px'}}>
              {[
                {label:c.emailLabel,value:c.emailValue,href:`mailto:${c.emailValue}`,icon:'✉'},
                {label:c.linkedinLabel,value:c.linkedinValue,href:`https://${c.linkedinValue}`,icon:'in'},
                {label:c.phoneLabel,value:c.phoneValue,href:`tel:${c.phoneValue.replace(/\s/g,'')}`,icon:'☎'},
              ].map(item=>(
                <a key={item.label} href={item.href} target={item.href.startsWith('http')?'_blank':undefined} rel="noopener noreferrer"
                   style={{display:'flex',alignItems:'center',gap:'16px',background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px 20px',textDecoration:'none',transition:'all 0.2s'}}
                   onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--mint)';e.currentTarget.style.background='rgba(110,155,116,0.05)';e.currentTarget.style.boxShadow='0 4px 20px rgba(46,82,51,0.08)';}}
                   onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--card-bg)';e.currentTarget.style.boxShadow='none';}}>
                  <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(110,155,116,0.15)',border:'1px solid rgba(110,155,116,0.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'14px',color:'var(--sage)',fontWeight:700}}>{item.icon}</div>
                  <div><p className="eyebrow" style={{marginBottom:'3px'}}>{item.label}</p><p style={{fontSize:'14px',fontWeight:500,color:'var(--forest)'}}>{item.value}</p></div>
                </a>
              ))}
            </div>
            <div style={{background:'linear-gradient(135deg,rgba(110,155,116,0.12),rgba(74,122,80,0.07))',border:'1px solid rgba(110,155,116,0.25)',borderRadius:'14px',padding:'28px',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',right:'-10px',bottom:'-10px',opacity:0.08,pointerEvents:'none'}}><Leaf size={72} color="var(--deep)" rotate={20}/></div>
              <div className="pull-quote"><p style={{fontSize:'16px',fontStyle:'italic',lineHeight:1.8,color:'var(--forest)',margin:0}}>{c.quote}</p></div>
            </div>
          </div>
        </div>
      </Page>
    );
  }

  /* ─────────────────────────────────────────────────
     FOOTER
  ───────────────────────────────────────────────── */
  function Footer() {
    return (
      <footer style={{background:'var(--forest)',padding:'32px 24px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',left:'-20px',top:'-20px',opacity:0.06,pointerEvents:'none'}}><Leaf size={120} color="#fff" rotate={-20}/></div>
        <div style={{position:'absolute',right:'60px',bottom:'-30px',opacity:0.05,pointerEvents:'none'}}><Leaf size={100} color="#fff" rotate={15}/></div>
        <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'12px',position:'relative',zIndex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontWeight:900,letterSpacing:'0.22em',fontSize:'13px',color:'rgba(255,255,255,0.9)'}}>VZ</span>
            <Leaf size={14} color="var(--sage-light)" opacity={0.6} rotate={-10}/>
          </div>
          <p style={{fontSize:'11px',color:'rgba(255,255,255,0.35)',letterSpacing:'0.1em'}}>Yifei (Viva) Zhang · 2025</p>
        </div>
      </footer>
    );
  }

  /* ─────────────────────────────────────────────────
     APP
  ───────────────────────────────────────────────── */
  function App() {
    const { path, navigate } = useRouter();
    const [lang, setLang] = useState('en');
    const t = T[lang];
    const render = () => {
      if (path === '/')                    return <HomePage navigate={navigate} t={t}/>;
      if (path === '/education')           return <EducationPage t={t}/>;
      if (path === '/experience')          return <ExperiencePage navigate={navigate} t={t}/>;
      if (path.startsWith('/experience/')) return <ExperienceDetailPage slug={path.slice(12)} navigate={navigate} t={t}/>;
      if (path === '/projects')            return <ProjectsPage navigate={navigate} t={t}/>;
      if (path.startsWith('/projects/'))   return <ProjectDetailPage slug={path.slice(10)} navigate={navigate} t={t}/>;
      if (path === '/human-side')          return <HumanSidePage t={t}/>;
      if (path === '/contact')             return <ContactPage t={t}/>;
      return <HomePage navigate={navigate} t={t}/>;
    };
    return (<><Nav path={path} navigate={navigate} lang={lang} setLang={setLang} t={t}/>{render()}<Footer/></>);
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
